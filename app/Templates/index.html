<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock ML Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, sans-serif; background: #0f1117; color: #fff; min-height: 100vh; padding: 40px 20px; }
    h1 { text-align: center; font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    p.subtitle { text-align: center; color: #888; margin-bottom: 40px; font-size: 14px; }
    .search-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 40px; }
    .search-bar input { background: #1c1f2e; border: 1px solid #2e3150; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 15px; width: 200px; outline: none; text-transform: uppercase; }
    .search-bar button { background: #4f6ef7; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 500; }
    .search-bar button:hover { background: #3a57d4; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1100px; margin: 0 auto; }
    .card { background: #1c1f2e; border-radius: 16px; padding: 24px; border: 1px solid #2e3150; position: relative; }
    .card .ticker { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .card .price { font-size: 14px; color: #888; margin-bottom: 20px; }
    .signal-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 20px; }
    .buy { background: #0d2e1a; color: #2ecc71; border: 1px solid #2ecc71; }
    .sell { background: #2e0d0d; color: #e74c3c; border: 1px solid #e74c3c; }
    .hold { background: #1e1e0d; color: #f39c12; border: 1px solid #f39c12; }
    .confidence-bar { margin-bottom: 20px; }
    .confidence-bar label { font-size: 12px; color: #888; display: flex; justify-content: space-between; margin-bottom: 6px; }
    .bar-track { background: #2e3150; border-radius: 4px; height: 6px; }
    .bar-fill { height: 6px; border-radius: 4px; transition: width 0.6s ease; }
    .bar-fill.buy { background: #2ecc71; border: none; padding: 0; }
    .bar-fill.sell { background: #e74c3c; border: none; padding: 0; }
    .bar-fill.hold { background: #f39c12; border: none; padding: 0; }
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .metric { background: #0f1117; border-radius: 8px; padding: 10px 12px; }
    .metric .label { font-size: 11px; color: #666; margin-bottom: 4px; }
    .metric .value { font-size: 15px; font-weight: 600; }
    .loading { text-align: center; color: #888; font-size: 14px; padding: 40px; }
    .remove-btn { position: absolute; top: 16px; right: 16px; background: none; border: none; color: #444; cursor: pointer; font-size: 18px; line-height: 1; }
    .remove-btn:hover { color: #e74c3c; }
  </style>
</head>
<body>
  <h1>📈 Stock ML Dashboard</h1>
  <p class="subtitle">XGBoost-powered signals — trained on 2 years of price data</p>
  <div class="search-bar">
    <input type="text" id="ticker-input" placeholder="e.g. NVDA" maxlength="6"/>
    <button onclick="addTicker()">Add Ticker</button>
  </div>
  <div class="grid" id="grid"></div>
  <script>
    const defaultTickers = ["AAPL", "TSLA", "MSFT", "NVDA"];
    const loaded = new Set();
    async function fetchSignal(ticker) {
      const res = await fetch(`/signal/${ticker}`);
      if (!res.ok) throw new Error("Failed");
      return res.json();
    }
    function renderCard(data) {
      const conf = Math.round(data.confidence * 100);
      const signal = data.signal.toLowerCase();
      return `
        <div class="card" id="card-${data.ticker}">
          <button class="remove-btn" onclick="removeCard('${data.ticker}')">×</button>
          <div class="ticker">${data.ticker}</div>
          <div class="price">$${data.features.close} · RSI ${data.features.rsi}</div>
          <span class="signal-badge ${signal}">${data.signal.toUpperCase()}</span>
          <div class="confidence-bar">
            <label><span>Confidence</span><span>${conf}%</span></label>
            <div class="bar-track"><div class="bar-fill ${signal}" style="width:${conf}%"></div></div>
          </div>
          <div class="metrics">
            <div class="metric"><div class="label">EMA 10</div><div class="value">${data.features.ema_10}</div></div>
            <div class="metric"><div class="label">EMA 30</div><div class="value">${data.features.ema_30}</div></div>
            <div class="metric"><div class="label">MACD</div><div class="value">${data.features.macd}</div></div>
            <div class="metric"><div class="label">RSI</div><div class="value">${data.features.rsi}</div></div>
          </div>
        </div>`;
    }
    function removeCard(ticker) {
      document.getElementById(`card-${ticker}`)?.remove();
      loaded.delete(ticker);
    }
    async function addTicker(ticker) {
      const input = document.getElementById("ticker-input");
      const t = (ticker || input.value.trim().toUpperCase());
      if (!t || loaded.has(t)) return;
      loaded.add(t);
      input.value = "";
      const grid = document.getElementById("grid");
      const placeholder = document.createElement("div");
      placeholder.className = "card loading";
      placeholder.id = `card-${t}`;
      placeholder.innerHTML = `Loading ${t}... (training model, ~20s)`;
      grid.prepend(placeholder);
      try {
        const data = await fetchSignal(t);
        placeholder.outerHTML = renderCard(data);
      } catch {
        placeholder.innerHTML = `<span style="color:#e74c3c">Failed to load ${t}</span>`;
        loaded.delete(t);
      }
    }
    document.getElementById("ticker-input").addEventListener("keydown", e => {
      if (e.key === "Enter") addTicker();
    });
    defaultTickers.forEach(t => addTicker(t));
  </script>
</body>
</html>
